
<!DOCTYPE html> 
<!-- Documento HTML5; Diz pro navegador qual padrão usar -->
<html lang="pt-br">
<!-- html = raiz do site; lang="pt-br" = idioma português (Brasil) -->
<head>
  <!-- Cabeçalho invisível (configurações) -->
  <meta charset="UTF-8">
  <!-- meta = metadado; charset = conjunto de caracteres; UTF-8 = permite acentos (á, ç, ã) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- viewport = área visível da tela; width=device-width = largura do dispositivo; initial-scale=1.0 = zoom padrão; Isso faz o site funcionar no celular -->
  <title>Bootstrap - Acordeão e Alertas</title>
  <!-- Nome da aba do navegador -->
  <!-- BOOTSTRAP CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- link = conecta arquivo externo; href = caminho; rel="stylesheet" = diz que é CSS; Aqui você está puxando o CSS do Bootstrap -->
</head>

<body>
<!-- Fecha o cabeçalho e começa o corpo (tudo visível) -->

<!-- CONTAINER (LAYOUT)  -->
<div class="container p-4">
<!-- div = divisão/bloco; Classes: container = centraliza e limita largura da página; p-4 = padding (espaço interno); escala Bootstrap: p-1 = pequeno; p-4 = médio;p-5 = grande -->
 
  <!-- TÍTULO ACCORDION -->
  <h1 class="text-center mb-4">ACORDEÃO</h1>
   <!-- h1 = título grande; text-center = centralizado; mb-4 = margem embaixo -->

  <!-- ACCORDION -->
  <div class="accordion" id="accordionExample">
  <!-- Cria o acordeão; id = identificador único -->
   
    <!-- ITEM 1 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapseOne"
          aria-expanded="true">
          O QUE É ACORDEÃO?
        </button>
      </h2>

      <div id="collapseOne" class="accordion-collapse collapse show"
        data-bs-parent="#accordionExample">
        <div class="accordion-body">
          Componente que abre e fecha conteúdos tipo sanfona.
        </div>
      </div>
    </div>

    <!-- ITEM 2 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapseTwo">
          PARA QUE SERVE?
        </button>
      </h2>

      <div id="collapseTwo" class="accordion-collapse collapse"
        data-bs-parent="#accordionExample">
        <div class="accordion-body">
          Organizar conteúdo sem poluir a tela.
        </div>
      </div>
    </div>

    <!-- ITEM 3 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapseThree">
          IMPORTÂNCIA
        </button>
      </h2>

      <div id="collapseThree" class="accordion-collapse collapse"
        data-bs-parent="#accordionExample">
        <div class="accordion-body">
          Melhora UX e economiza espaço.
        </div>
      </div>
    </div>

  </div>

  <!-- ALERTAS -->
  <h1 class="text-center mt-5 mb-4">ALERTAS</h1>

  <!-- BOTÕES -->
  <div class="row mb-4">
    <div class="col-md-4">
      <button class="btn btn-success w-100" onclick="mostrarAlerta('success')">Sucesso</button>
    </div>
    <div class="col-md-4">
      <button class="btn btn-danger w-100" onclick="mostrarAlerta('danger')">Erro</button>
    </div>
    <div class="col-md-4">
      <button class="btn btn-warning w-100" onclick="mostrarAlerta('warning')">Aviso</button>
    </div>
  </div>

  <!-- AREA ALERTA -->
  <div id="areaAlertas"></div>

  <!-- FORM -->
  <div class="card shadow mt-4">
    <div class="card-body">
      <h5>Cadastro</h5>

      <form onsubmit="enviarFormulario(event)">
        <input type="text" id="nome" class="form-control mb-3" placeholder="Nome">
        <input type="email" id="email" class="form-control mb-3" placeholder="Email">
        <button class="btn btn-primary w-100">Enviar</button>
      </form>
    </div>
  </div>

</div>

<!-- Bootstrap JS (ESSENCIAL) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT -->
<script>

function mostrarAlerta(tipo) {
  let mensagem = "";

  if (tipo === "success") mensagem = "Sucesso!";
  if (tipo === "danger") mensagem = "Erro!";
  if (tipo === "warning") mensagem = "Atenção!";

  document.getElementById("areaAlertas").innerHTML = `
    <div class="alert alert-${tipo} alert-dismissible fade show mt-3">
      ${mensagem}
      <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  `;
}

function enviarFormulario(event) {
  event.preventDefault();

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;

  if (nome === "" || email === "") {
    mostrarAlerta("danger");
  } else {
    mostrarAlerta("success");
  }
}

</script>

</body>
</html>
